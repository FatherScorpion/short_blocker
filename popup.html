<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Shorts 時間制限 - 設定</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Shorts 時間制限</h1>
    <p class="description">YouTube Shortsの1日あたりの視聴時間を制限します</p>

    <div class="setting-group">
      <label for="timeLimit">制限時間（1日あたり）</label>
      <select id="timeLimit">
        <option value="300">5分</option>
        <option value="600">10分</option>
        <option value="900">15分</option>
        <option value="1800">30分</option>
        <option value="3600">60分</option>
        <option value="5400">90分</option>
        <option value="7200">120分</option>
        <option value="custom">カスタム</option>
      </select>
    </div>

    <div class="setting-group custom-group" id="customGroup" style="display: none;">
      <label>分数・秒数を入力</label>
      <div class="custom-time-inputs">
        <div>
          <input type="number" id="customMinutes" min="0" max="480" value="30" placeholder="分">
          <span class="unit">分</span>
        </div>
        <div>
          <input type="number" id="customSeconds" min="0" max="59" value="0" placeholder="秒">
          <span class="unit">秒</span>
        </div>
      </div>
    </div>

    <div class="usage-info" id="usageInfo">
      <p>本日の使用時間: <span id="usedTimeDisplay">--</span> / <span id="limitDisplay">--</span></p>
    </div>

    <button id="saveBtn" class="save-btn">保存</button>
    <p class="save-status" id="saveStatus"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
